name: Build test

on:
  workflow_call:
    inputs:
      env:
        description: Environment name
        required: false
        default: dev
        type: string

      FilePath:
        description: Application directory path
        required: false
        type: string

jobs:
  runs-local-test:
    runs-on: ubuntu-latest

    # defaults:
    #   run:
    #     working-directory: ${{ inputs.FilePath }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Show Current Directory
        run: pwd

      - name: List Files
        run: ls -la

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
    
  

